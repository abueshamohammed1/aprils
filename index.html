<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --red: #E24B4A;
        --red-light: #FCEBEB;
        --red-dark: #A32D2D;
        --blue: #378ADD;
        --blue-light: #E6F1FB;
        --blue-dark: #185FA5;
        --green: #639922;
        --green-light: #EAF3DE;
        --green-dark: #3B6D11;
        --yellow: #f7ba2a;
        --yellow-light: #FCF0CC;
        --yellow-dark: #9A6908;
    }

    body {
        font-family: var(--font-sans,sans-serif);
        background: #fff;
    }

    #app {
        background: #fff;
        min-height: 600px;
    }

    .top-bar {
        background: var(--yellow);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
    }

        .top-bar h1 {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

    .mode-btns {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .mode-btn {
        padding: 4px 12px;
        border-radius: 5px;
        border: 1.5px solid rgba(255,255,255,0.7);
        background: transparent;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
    }

        .mode-btn.active {
            background: #fff;
            color: var(--yellow-dark);
            font-weight: 500;
        }

    .sync-btn {
        padding: 4px 10px;
        border-radius: 5px;
        border: 1.5px solid rgba(255,255,255,0.7);
        background: transparent;
        color: #fff;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 4px;
    }

        .sync-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }

    .spin {
        display: inline-block;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .legend {
        display: flex;
        gap: 14px;
        padding: 8px 16px;
        background: #fffdf5;
        border-bottom: 0.5px solid #f0e8c0;
        flex-wrap: wrap;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: #555;
    }

    .legend-dot {
        width: 11px;
        height: 11px;
        border-radius: 3px;
    }

    .search-bar {
        padding: 8px 16px;
        background: #fffdf5;
        border-bottom: 0.5px solid #f0e8c0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

        .search-bar input {
            flex: 1;
            max-width: 380px;
            padding: 6px 10px;
            border: 0.5px solid #d0c890;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
        }

    .status-bar {
        padding: 5px 16px;
        font-size: 11px;
        color: #888;
        background: #fffdf5;
        border-bottom: 0.5px solid #f0e8c0;
        min-height: 22px;
    }

        .status-bar.err {
            color: var(--red-dark);
            background: var(--red-light);
        }

        .status-bar.ok {
            color: var(--green-dark);
            background: var(--green-light);
        }

    .view-note {
        padding: 6px 16px;
        background: var(--blue-light);
        font-size: 12px;
        color: var(--blue-dark);
        text-align: center;
    }

    .calendar-wrapper {
        padding: 12px 16px;
    }

    .cal-header {
        display: grid;
        grid-template-columns: repeat(7,1fr);
        gap: 2px;
        margin-bottom: 3px;
    }

    .day-name {
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--yellow-dark);
        padding: 3px 0;
        background: var(--yellow-light);
        border-radius: 3px;
    }

    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7,1fr);
        gap: 2px;
    }

    .cal-cell {
        background: #fafafa;
        border: 0.5px solid #e8e0c0;
        border-radius: 5px;
        min-height: 80px;
        padding: 4px;
        position: relative;
    }

        .cal-cell.empty {
            background: #fff;
            border-color: #f5f0e5;
        }

        .cal-cell.today {
            border-color: var(--yellow);
            border-width: 1.5px;
        }

    .date-num {
        font-size: 12px;
        font-weight: 500;
        color: var(--yellow-dark);
        margin-bottom: 2px;
    }

    .cal-cell.today .date-num {
        background: var(--yellow);
        color: #fff;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
    }

    .exam-pill {
        font-size: 9px;
        padding: 2px 4px;
        border-radius: 3px;
        margin-bottom: 1px;
        cursor: pointer;
        line-height: 1.4;
        word-break: break-word;
        border-left: 2px solid transparent;
    }

        .exam-pill.hidden-search {
            display: none;
        }

    .add-btn {
        position: absolute;
        bottom: 3px;
        right: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--yellow-light);
        border: 1px solid var(--yellow);
        color: var(--yellow-dark);
        font-size: 13px;
        line-height: 14px;
        text-align: center;
        cursor: pointer;
        display: none;
        font-family: inherit;
    }

    .cal-cell:hover .add-btn {
        display: block;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
    }

        .overlay.show {
            display: flex;
        }

    .modal {
        background: #fff;
        border-radius: 10px;
        padding: 18px;
        width: 360px;
        max-width: 95vw;
        border: 0.5px solid #e0d8b0;
        max-height: 90vh;
        overflow-y: auto;
    }

        .modal.wide {
            width: 420px;
        }

        .modal h3 {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
        }

        .modal label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 2px;
            margin-top: 9px;
        }

        .modal input, .modal select, .modal textarea {
            width: 100%;
            padding: 6px 9px;
            border: 0.5px solid #d0c890;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
        }

        .modal textarea {
            height: 52px;
            resize: vertical;
        }

    .modal-actions {
        display: flex;
        gap: 7px;
        margin-top: 12px;
        justify-content: flex-end;
    }

    .btn {
        padding: 6px 14px;
        border-radius: 5px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        border: none;
    }

    .btn-primary {
        background: var(--yellow);
        color: #fff;
    }

    .btn-secondary {
        background: #f5f0e0;
        color: #666;
        border: 0.5px solid #d0c890;
    }

    .btn-danger {
        background: var(--red-light);
        color: var(--red-dark);
        border: 0.5px solid var(--red);
    }

    .share-panel {
        padding: 8px 16px;
        background: #f5f0e0;
        border-bottom: 0.5px solid #e0d8b0;
        font-size: 12px;
        color: #666;
        display: none;
    }

        .share-panel input {
            width: 100%;
            padding: 5px 8px;
            border: 0.5px solid #d0c890;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
            margin-top: 4px;
            background: #fff;
        }

    .detail-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.4);
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
    }

        .detail-overlay.show {
            display: flex;
        }

    .detail-modal {
        background: #fff;
        border-radius: 10px;
        padding: 18px;
        width: 320px;
        max-width: 95vw;
    }

        .detail-modal h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 7px;
        }

    .detail-row {
        font-size: 12px;
        color: #555;
        margin-bottom: 3px;
    }

    .detail-cat-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .detail-actions {
        display: flex;
        gap: 7px;
        margin-top: 12px;
    }

    .cat-row {
        display: grid;
        grid-template-columns: 1fr 74px 62px;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
    }

    .cat-chip {
        height: 32px;
        border-radius: 5px;
        border: 0.5px solid #d0c890;
        padding: 0 8px;
        display: flex;
        align-items: center;
        font-size: 12px;
        color: #555;
        background: #fff;
    }

    .cat-row input[type="color"] {
        height: 32px;
        padding: 2px;
        cursor: pointer;
    }

    .cat-empty {
        font-size: 12px;
        color: #888;
        padding: 4px 0;
    }
</style>

<div id="app">
    <div class="top-bar">
        <h1>April 2026 — Exam Calendar</h1>
        <div class="mode-btns" id="mode-btns">
            <button class="mode-btn active" id="btn-admin" onclick="setMode('admin')">Admin</button>
            <button class="mode-btn" id="btn-view" onclick="setMode('view')">View only</button>
            <button class="mode-btn" onclick="openCatsModal()">Categories</button>
            <button class="mode-btn" onclick="toggleShare()">Share</button>
            <button class="sync-btn" id="sync-btn" onclick="syncNow()" title="Sync with cloud">&#x21bb; Sync</button>
        </div>
    </div>

    <div id="view-note" class="view-note" style="display:none;">View-only mode — your friends see the same exams in real time.</div>

    <div class="legend" id="legend"></div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search exams by name..." oninput="doSearch(this.value)">
    </div>

    <div id="status" class="status-bar">Loading exams...</div>

    <div id="share-panel" class="share-panel">
        <div>Share this link with your friends for view-only access:</div>
        <input type="text" id="share-link-input" readonly onclick="this.select()">
    </div>

    <div class="calendar-wrapper">
        <div class="cal-header">
            <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
            <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>
</div>

<div class="overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">Add exam</h3>
        <label>Exam name</label>
        <input type="text" id="f-name" placeholder="e.g. Calculus II">
        <label>Category</label>
        <select id="f-cat"></select>
        <label>Date</label>
        <input type="date" id="f-date" min="2026-04-01" max="2026-04-30">
        <label>Session 1 time</label>
        <input type="time" id="f-time1">
        <label>Session 2 time (optional)</label>
        <input type="time" id="f-time2">
        <label>Notes (optional)</label>
        <textarea id="f-notes" placeholder="Room, location, etc."></textarea>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveExam()">Save</button>
        </div>
    </div>
</div>

<div class="overlay" id="cats-overlay">
    <div class="modal wide">
        <h3>Manage categories</h3>
        <div id="cats-list"></div>
        <label>New category name</label>
        <input type="text" id="new-cat-name" placeholder="e.g. Cohort 126">
        <label>Color</label>
        <input type="color" id="new-cat-color" value="#378ADD">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeCatsModal()">Close</button>
            <button class="btn btn-primary" onclick="addCategory()">Add category</button>
        </div>
    </div>
</div>

<div class="detail-overlay" id="detail-overlay">
    <div class="detail-modal">
        <div id="d-badge" class="detail-cat-badge"></div>
        <h4 id="d-name"></h4>
        <div class="detail-row" id="d-date"></div>
        <div class="detail-row" id="d-times"></div>
        <div class="detail-row" id="d-notes"></div>
        <div class="detail-actions" id="d-actions"></div>
    </div>
</div>

<script>
    const STORE_KEY = 'examcal_shared_v3';
    const CLOUD_KEY = 'april2026_exams';
    const DEFAULT_CATS = [
        { id: '124', name: 'Cohort 124', color: '#E24B4A' },
        { id: '125', name: 'Cohort 125', color: '#378ADD' },
        { id: 'gen', name: 'General exams', color: '#639922' }
    ];
    let exams = [];
    let categories = [];
    let mode = 'admin';
    let editingId = null;
    let isSyncing = false;
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    function setStatus(msg, type = '') {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function slugify(s) { return s.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 24) || uid(); }
    function getCategory(catId) { return categories.find(c => c.id === catId) || categories[0] || null; }
    function hexToRgb(hex) {
        const clean = hex.replace('#', '');
        const full = clean.length === 3 ? clean.split('').map(x => x + x).join('') : clean;
        const num = parseInt(full, 16);
        return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    }
    function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0')).join('');
    }
    function mix(hex, target, ratio) {
        const a = hexToRgb(hex), b = hexToRgb(target);
        return rgbToHex(a.r + (b.r - a.r) * ratio, a.g + (b.g - a.g) * ratio, a.b + (b.b - a.b) * ratio);
    }
    function getCatStyle(catId) {
        const cat = getCategory(catId);
        const base = cat ? cat.color : '#888888';
        return { bg: mix(base, '#ffffff', 0.86), color: mix(base, '#000000', 0.28), border: base };
    }

    function normalizeData(data) {
        const nextExams = Array.isArray(data.exams) ? data.exams : [];
        const nextCats = Array.isArray(data.categories) && data.categories.length ? data.categories : DEFAULT_CATS;
        categories = nextCats.map(c => ({ id: String(c.id), name: String(c.name), color: (c.color || '#378ADD') }));
        exams = nextExams.map(e => ({
            id: e.id || uid(),
            name: e.name || '',
            cat: String(e.cat || categories[0]?.id || '124'),
            date: e.date || '',
            time1: e.time1 || '',
            time2: e.time2 || '',
            notes: e.notes || ''
        })).filter(e => getCategory(e.cat));
    }

    function loadLocal() {
        try {
            const d = localStorage.getItem(STORE_KEY);
            if (d) { normalizeData(JSON.parse(d)); return; }
        } catch (e) { }
        normalizeData({ categories: DEFAULT_CATS, exams: [] });
    }
    function saveLocal() {
        try { localStorage.setItem(STORE_KEY, JSON.stringify({ categories, exams })); } catch (e) { }
    }

    async function fetchCloudExams() {
        const prompt = `You are a JSON database. Return ONLY the current value stored under the key "${CLOUD_KEY}". If nothing is stored yet, return: {"categories":${JSON.stringify(DEFAULT_CATS)},"exams":[]}. Return raw JSON only, no explanation, no markdown.`;
        try {
            const r = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4000, system: 'You are a stateless key-value JSON store. Always respond with raw JSON only.', messages: [{ role: 'user', content: prompt }] })
            });
            const d = await r.json();
            const txt = d.content?.find(c => c.type === 'text')?.text || '';
            const clean = txt.replace(/```json|```/g, '').trim();
            return JSON.parse(clean);
        } catch (e) { return null; }
    }

    async function pushCloudExams() {
        const data = JSON.stringify({ categories, exams });
        const prompt = `Store this data under key "${CLOUD_KEY}": ${data}\n\nConfirm by returning exactly: {"stored":true,"count":${exams.length}}`;
        try {
            const r = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 200, system: 'You are a data store confirmer. Respond with raw JSON only.', messages: [{ role: 'user', content: prompt }] })
            });
            await r.json();
            return true;
        } catch (e) { return false; }
    }

    async function syncNow(silent = false) {
        if (isSyncing) return;
        isSyncing = true;
        const btn = document.getElementById('sync-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spin">&#x21bb;</span> Syncing';
        if (!silent) setStatus('Syncing with cloud...');
        const cloud = await fetchCloudExams();
        if (cloud === null) {
            setStatus('Sync failed — showing local data', 'err');
        } else {
            const localCount = exams.length;
            const cloudCount = Array.isArray(cloud.exams) ? cloud.exams.length : 0;
            if (cloudCount > 0 || localCount === 0) {
                normalizeData(cloud);
                saveLocal();
            }
            renderAll();
            setStatus('Synced — ' + exams.length + ' exam(s) loaded', 'ok');
        }
        btn.disabled = false;
        btn.innerHTML = '&#x21bb; Sync';
        isSyncing = false;
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btn-admin').classList.toggle('active', m === 'admin');
        document.getElementById('btn-view').classList.toggle('active', m === 'view');
        document.getElementById('view-note').style.display = m === 'view' ? 'block' : 'none';
        renderCal();
    }

    function toggleShare() {
        const p = document.getElementById('share-panel');
        const visible = p.style.display === 'block';
        p.style.display = visible ? 'none' : 'block';
        if (!visible) {
            const base = window.location.href.split('?')[0];
            document.getElementById('share-link-input').value = base + '?view=true';
        }
    }

    function checkViewParam() {
        try {
            const p = new URLSearchParams(window.location.search);
            if (p.get('view') === 'true') {
                setMode('view');
                document.getElementById('mode-btns').style.display = 'none';
            }
        } catch (e) { }
    }

    function fmtTime(t) { if (!t) return ''; const [h, m] = t.split(':'); const hh = parseInt(h, 10); return (hh % 12 || 12) + ':' + m + (hh < 12 ? 'am' : 'pm'); }
    function fmtDate(d) { const dt = new Date(d + 'T00:00:00'); return dt.getDate() + ' ' + months[dt.getMonth()] + ' ' + dt.getFullYear(); }

    function renderLegend() {
        const wrap = document.getElementById('legend');
        wrap.innerHTML = '';
        categories.forEach(cat => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = '<div class="legend-dot" style="background:' + cat.color + '"></div>' + escapeHtml(cat.name);
            wrap.appendChild(item);
        });
    }

    function renderCatOptions() {
        const sel = document.getElementById('f-cat');
        const current = sel.value;
        sel.innerHTML = '';
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.name;
            sel.appendChild(opt);
        });
        if (categories.some(c => c.id === current)) sel.value = current;
    }

    function renderCal() {
        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';
        const firstDay = new Date(2026, 3, 1).getDay();
        for (let i = 0; i < firstDay; i++) {
            const c = document.createElement('div');
            c.className = 'cal-cell empty';
            grid.appendChild(c);
        }
        const today = new Date();
        for (let d = 1; d <= 30; d++) {
            const cell = document.createElement('div');
            cell.className = 'cal-cell';
            const isToday = today.getFullYear() === 2026 && today.getMonth() === 3 && today.getDate() === d;
            if (isToday) cell.classList.add('today');
            const dateStr = '2026-04-' + String(d).padStart(2, '0');
            const numEl = document.createElement('div');
            numEl.className = 'date-num';
            if (isToday) { numEl.style.cssText = 'width:20px;height:20px;border-radius:50%;background:var(--yellow);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;'; }
            numEl.textContent = d;
            cell.appendChild(numEl);
            const dayExams = exams.filter(e => e.date === dateStr).sort((a, b) => (a.time1 || '').localeCompare(b.time1 || ''));
            dayExams.forEach(ex => {
                const pill = document.createElement('div');
                const st = getCatStyle(ex.cat);
                pill.className = 'exam-pill';
                pill.dataset.id = ex.id;
                pill.style.background = st.bg;
                pill.style.color = st.color;
                pill.style.borderLeftColor = st.border;
                let txt = ex.name;
                if (ex.time1) txt += ' ' + fmtTime(ex.time1);
                if (ex.time2) txt += '/' + fmtTime(ex.time2);
                pill.textContent = txt;
                pill.onclick = () => showDetail(ex.id);
                cell.appendChild(pill);
            });
            if (mode === 'admin') {
                const add = document.createElement('div');
                add.className = 'add-btn';
                add.textContent = '+';
                add.onclick = (e) => { e.stopPropagation(); openModal(null, dateStr); };
                cell.appendChild(add);
            }
            grid.appendChild(cell);
        }
        doSearch(document.getElementById('search').value);
    }

    function renderAll() {
        renderLegend();
        renderCatOptions();
        renderCal();
        renderCatsModal();
    }

    function openModal(id, date) {
        editingId = id;
        const ex = id ? exams.find(e => e.id === id) : null;
        renderCatOptions();
        document.getElementById('modal-title').textContent = id ? 'Edit exam' : 'Add exam';
        document.getElementById('f-name').value = ex ? ex.name : '';
        document.getElementById('f-cat').value = ex ? ex.cat : (categories[0]?.id || '');
        document.getElementById('f-date').value = ex ? ex.date : (date || '');
        document.getElementById('f-time1').value = ex ? ex.time1 : '';
        document.getElementById('f-time2').value = ex ? ex.time2 : '';
        document.getElementById('f-notes').value = ex ? ex.notes : '';
        document.getElementById('modal-overlay').classList.add('show');
        setTimeout(() => document.getElementById('f-name').focus(), 50);
    }
    function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); editingId = null; }

    async function saveExam() {
        const name = document.getElementById('f-name').value.trim();
        const cat = document.getElementById('f-cat').value;
        const date = document.getElementById('f-date').value;
        const time1 = document.getElementById('f-time1').value;
        const time2 = document.getElementById('f-time2').value;
        const notes = document.getElementById('f-notes').value.trim();
        if (!name) { alert('Please enter an exam name.'); return; }
        if (!cat || !getCategory(cat)) { alert('Please select a category.'); return; }
        if (!date) { alert('Please select a date.'); return; }
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.textContent = 'Saving...';
        if (editingId) {
            const ex = exams.find(e => e.id === editingId);
            if (ex) Object.assign(ex, { name, cat, date, time1, time2, notes });
        } else {
            exams.push({ id: uid(), name, cat, date, time1, time2, notes });
        }
        saveLocal();
        const ok = await pushCloudExams();
        btn.disabled = false; btn.textContent = 'Save';
        closeModal(); renderAll();
        setStatus(ok ? 'Saved and synced to cloud — ' + exams.length + ' exam(s)' : 'Saved locally (cloud sync failed)', 'ok');
    }

    function showDetail(id) {
        const ex = exams.find(e => e.id === id); if (!ex) return;
        const badge = document.getElementById('d-badge');
        const st = getCatStyle(ex.cat);
        const cat = getCategory(ex.cat);
        badge.style.background = st.bg; badge.style.color = st.color;
        badge.textContent = cat ? cat.name : 'Unknown';
        document.getElementById('d-name').textContent = ex.name;
        document.getElementById('d-date').textContent = 'Date: ' + fmtDate(ex.date);
        let times = '';
        if (ex.time1) times = 'Session 1: ' + fmtTime(ex.time1);
        if (ex.time2) times += (times ? ' | ' : '') + 'Session 2: ' + fmtTime(ex.time2);
        document.getElementById('d-times').textContent = times || 'No time specified';
        document.getElementById('d-notes').textContent = ex.notes ? 'Notes: ' + ex.notes : '';
        const actions = document.getElementById('d-actions'); actions.innerHTML = '';
        if (mode === 'admin') {
            const eb = document.createElement('button'); eb.className = 'btn btn-primary'; eb.textContent = 'Edit';
            eb.onclick = () => { closeDetail(); openModal(id); };
            const db = document.createElement('button'); db.className = 'btn btn-danger'; db.textContent = 'Delete';
            db.onclick = async () => {
                if (!confirm('Delete "' + ex.name + '"?')) return;
                exams = exams.filter(e => e.id !== id);
                saveLocal(); await pushCloudExams();
                closeDetail(); renderAll();
                setStatus('Deleted and synced', 'ok');
            };
            actions.appendChild(eb); actions.appendChild(db);
        }
        const cb = document.createElement('button'); cb.className = 'btn btn-secondary'; cb.textContent = 'Close';
        cb.onclick = closeDetail; actions.appendChild(cb);
        document.getElementById('detail-overlay').classList.add('show');
    }
    function closeDetail() { document.getElementById('detail-overlay').classList.remove('show'); }

    function openCatsModal() { renderCatsModal(); document.getElementById('cats-overlay').classList.add('show'); }
    function closeCatsModal() { document.getElementById('cats-overlay').classList.remove('show'); }

    function renderCatsModal() {
        const wrap = document.getElementById('cats-list');
        wrap.innerHTML = '';
        if (!categories.length) {
            wrap.innerHTML = '<div class="cat-empty">No categories yet.</div>';
            return;
        }
        categories.forEach(cat => {
            const row = document.createElement('div');
            row.className = 'cat-row';
            const chip = document.createElement('div');
            chip.className = 'cat-chip';
            chip.textContent = cat.name;
            const st = getCatStyle(cat.id);
            chip.style.background = st.bg;
            chip.style.color = st.color;
            chip.style.borderLeft = '3px solid ' + cat.color;

            const color = document.createElement('input');
            color.type = 'color';
            color.value = cat.color;
            color.oninput = () => updateCategoryColor(cat.id, color.value);

            const del = document.createElement('button');
            del.className = 'btn btn-danger';
            del.textContent = 'Delete';
            del.onclick = () => deleteCategory(cat.id);

            row.appendChild(chip);
            row.appendChild(color);
            row.appendChild(del);
            wrap.appendChild(row);
        });
    }

    async function addCategory() {
        const name = document.getElementById('new-cat-name').value.trim();
        const color = document.getElementById('new-cat-color').value;
        if (!name) { alert('Please enter a category name.'); return; }
        if (categories.some(c => c.name.toLowerCase() === name.toLowerCase())) { alert('This category already exists.'); return; }
        let id = slugify(name);
        while (categories.some(c => c.id === id)) id = slugify(name + '-' + Math.random().toString(36).slice(2, 5));
        categories.push({ id, name, color });
        document.getElementById('new-cat-name').value = '';
        saveLocal();
        const ok = await pushCloudExams();
        renderAll();
        setStatus(ok ? 'Category added and synced' : 'Category added locally (cloud sync failed)', 'ok');
    }

    async function updateCategoryColor(catId, color) {
        const cat = getCategory(catId); if (!cat) return;
        cat.color = color;
        saveLocal();
        renderAll();
        await pushCloudExams();
    }

    async function deleteCategory(catId) {
        if (categories.length <= 1) { alert('At least one category is required.'); return; }
        const cat = getCategory(catId);
        if (!cat) return;
        const usedExams = exams.filter(e => e.cat === catId);
        let targetCatId = null;
        if (usedExams.length) {
            const otherCats = categories.filter(c => c.id !== catId);
            const options = otherCats.map((c, i) => (i + 1) + '. ' + c.name).join('\n');
            const answer = prompt('This category is used by ' + usedExams.length + ' exam(s). Enter the number of the category you want to move them to before deleting:\n\n' + options, '1');
            if (answer === null) return;
            const idx = parseInt(answer, 10);
            if (!idx || idx < 1 || idx > otherCats.length) { alert('Invalid choice. Category was not deleted.'); return; }
            targetCatId = otherCats[idx - 1].id;
        }
        let msg = 'Delete category "' + cat.name + '"?';
        if (targetCatId) {
            const targetCat = getCategory(targetCatId);
            msg = 'Move ' + usedExams.length + ' exam(s) from "' + cat.name + '" to "' + targetCat.name + '" and delete the category?';
        }
        if (!confirm(msg)) return;
        if (targetCatId) {
            exams.forEach(e => { if (e.cat === catId) e.cat = targetCatId; });
        }
        categories = categories.filter(c => c.id !== catId);
        saveLocal();
        const ok = await pushCloudExams();
        renderAll();
        if (targetCatId) {
            setStatus(ok ? 'Category deleted, exams moved, and synced' : 'Category deleted and exams moved locally (cloud sync failed)', 'ok');
        } else {
            setStatus(ok ? 'Category deleted and synced' : 'Category deleted locally (cloud sync failed)', 'ok');
        }
    }

    function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    document.getElementById('modal-overlay').addEventListener('click', function (e) { if (e.target === this) closeModal(); });
    document.getElementById('detail-overlay').addEventListener('click', function (e) { if (e.target === this) closeDetail(); });
    document.getElementById('cats-overlay').addEventListener('click', function (e) { if (e.target === this) closeCatsModal(); });

    function doSearch(q) {
        q = q.trim().toLowerCase();
        document.querySelectorAll('.exam-pill').forEach(pill => {
            if (!q) { pill.classList.remove('hidden-search'); return; }
            const ex = exams.find(e => e.id === pill.dataset.id);
            pill.classList.toggle('hidden-search', !ex || !ex.name.toLowerCase().includes(q));
        });
    }

    loadLocal();
    renderAll();
    checkViewParam();
    syncNow();
    setInterval(() => syncNow(true), 30000);
</script>
